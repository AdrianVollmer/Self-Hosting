# /etc/anchorage/anchorage.conf
# Configuration for the anchorage self-hosting framework.
# See man anchorage(7) for details.

# DNS suffix appended to every service hostname.
# Examples: local  home.arpa  lan  example.com
DOMAIN_SUFFIX=local

# IP address of this host, registered in DNS for all service hostnames.
# Leave empty to skip DNS registration.
IP=

# DNS server address for dynamic updates via nsupdate.
# Typically the address of your router or a local DNS server.
DNS_SERVER=

# DNS record TTL in seconds.
TTL=3600
